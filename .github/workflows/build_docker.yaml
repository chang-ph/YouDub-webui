name: Build and Push Docker image to GitHub Packages

on:
  workflow_dispatch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.spleeter -t ghcr.io/${{ github.repository_owner }}/spleeter:latest .
          docker build -f Dockerfile.whisperx -t ghcr.io/${{ github.repository_owner }}/whisperx:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/spleeter:latest
          docker push ghcr.io/${{ github.repository_owner }}/whisperx:latest
